name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ruff pytest coverage requests msal numpy mcp

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest + coverage)
        run: coverage run -m pytest -v

      - name: Coverage report
        # Erst die Zusammenfassung schreiben, dann das Gate durchsetzen:
        # fail_under steht in pyproject.toml ([tool.coverage.report])
        run: |
          coverage report --format=markdown --fail-under=0 >> "$GITHUB_STEP_SUMMARY"
          coverage report
