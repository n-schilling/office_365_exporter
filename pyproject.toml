[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, B = bugbear, UP = pyupgrade
select = ["E", "W", "F", "B", "UP"]
# Zeilenlänge wird nicht erzwungen (gewachsener Stil, viele lange deutsche Strings)
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["."]
omit = ["tests/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
# Stand bei Einführung: 83 % (nur Quellmodule, ohne tests/) – Puffer gegen Erosion
fail_under = 80
